name: "Build Pico2 FIDO2"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for RP2350 (Pico2)
    strategy:
      fail-fast: false
      matrix:
        board: [pico2]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 1. 关键：设置为 false，防止在 checkout 阶段因为找不到 commit 而报错
          submodules: false
          fetch-depth: 0

      - name: Force update submodules to latest
        # 2. 关键：手动初始化并强制拉取子模块远程分支的最新代码
        run: |
          git submodule init
          git submodule update --remote --recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Clone and build pico-sdk
        run: |
          # 提示：如果你的项目频繁构建，建议将 pico-sdk 也作为子模块或使用 cache 优化
          git clone https://github.com/raspberrypi/pico-sdk
          cd pico-sdk
          git checkout tags/2.1.1
          git submodule update --init
          cd ..

      - name: Build firmware
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          mkdir -p build_ci
          cd build_ci
          # 针对 RP2350 的编译配置
          cmake .. -DPICO_BOARD=${{ matrix.board }} -DPICO_PLATFORM=rp2350-arm-s
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico2_fido2_firmware
          path: build_ci/pico_fido2.uf2